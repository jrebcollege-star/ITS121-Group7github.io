<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | MCS PH</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0d1117; 
            color: white; 
            padding: 50px; 
            font-family: 'Roboto Mono', monospace; 
        }
        
        .admin-table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-bottom: 50px; 
            background: #161b22; 
        }
        
        .admin-table th, .admin-table td { 
            border: 1px solid #30363d; 
            padding: 12px; 
            text-align: left; 
        }
        
        .admin-table th { 
            color: #58a6ff; 
        }
        
        #login-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #0d1117; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 9999; 
        }
        
        .login-box { 
            background: #161b22; 
            padding: 40px; 
            border: 1px solid #30363d; 
            border-radius: 8px; 
            text-align: center; 
        }
        
        input { 
            display: block; 
            width: 100%; 
            margin: 10px 0; 
            padding: 10px; 
            background: #0d1117; 
            border: 1px solid #30363d; 
            color: white; 
            font-family: 'Roboto Mono', monospace;
        }

        .back-home-btn {
            display: inline-block;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 8px 16px;
            border: 1px solid #30363d;
            border-radius: 4px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 10000;
        }

        .back-home-btn:hover {
            background-color: rgba(88, 166, 255, 0.1);
            border-color: #58a6ff;
        }

        .btn-primary {
            background: transparent;
            color: #58a6ff;
            border: 1px solid #58a6ff;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Roboto Mono', monospace;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: rgba(88, 166, 255, 0.1);
        }

        h1, h3 { color: #f0f6fc; }
    </style>
</head>
<body>

    <a href="index.html" class="back-home-btn">← BACK_TO_HOME</a>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:#58a6ff; margin-bottom:20px;">ADMIN_ACCESS</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-primary" onclick="checkLogin()">LOGIN</button>
        </div>
    </div>

    <h1>System Dashboard</h1>
    
    <h3>Contact Inquiries</h3>
    <table class="admin-table" id="inquiryTable">
        <thead>
            <tr>
                <th>Time</th>
                <th>Name</th>
                <th>Email</th>
                <th>Service</th>
                <th>Message</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h3>Job Applications</h3>
    <table class="admin-table" id="appTable">
        <thead>
            <tr>
                <th>Time</th>
                <th>Name</th>
                <th>Email</th>
                <th>Position</th>
                <th>Experience</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button class="btn-primary" onclick="localStorage.clear(); location.reload();">CLEAR_ALL_DATA</button>

    <script>
        function checkLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === 'admin' && p === 'xport2026') {
                document.getElementById('login-overlay').style.display = 'none';
                loadData();
            } else { 
                alert('Access Denied'); 
            }
        }

        function loadData() {
            const inquiries = JSON.parse(localStorage.getItem('inquiries') || '[]');
            const apps = JSON.parse(localStorage.getItem('applications') || '[]');

            const inqBody = document.querySelector('#inquiryTable tbody');
            inqBody.innerHTML = "";
            inquiries.forEach(d => {
                inqBody.innerHTML += `<tr><td>${d.timestamp}</td><td>${d.name}</td><td>${d.email}</td><td>${d.service}</td><td>${d.message}</td></tr>`;
            });

            const appBody = document.querySelector('#appTable tbody');
            appBody.innerHTML = "";
            apps.forEach(d => {
                appBody.innerHTML += `<tr><td>${d.timestamp}</td><td>${d.name}</td><td>${d.email}</td><td>${d.position}</td><td>${d.experience || 'N/A'}</td></tr>`;
            });
        }
    </script>
</body>
</html>
